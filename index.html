<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Álbum Copa do Mundo 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="app" id="app">

    <header class="topbar">
      <div class="topbar-brand">
        <span class="trophy">⚽</span>
        <div>
          <h1>Álbum Copa do Mundo 2026</h1>
          <p>FIFA World Cup 2026™ · USA · Canada · México</p>
        </div>
      </div>
      <div class="global-prog">
        <div class="prog-row">
          <span id="globalLabel">0 de 0</span>
          <strong id="globalPct">0%</strong>
        </div>
        <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      </div>
    </header>

    <nav class="nav-row">
      <button class="nav-arr" id="btnPrev">‹</button>
      <button class="picker-btn" id="btnPicker">
        <span class="picker-flag" id="pickerFlag">⚽</span>
        <div class="picker-info">
          <span class="picker-name" id="pickerName">Carregando…</span>
          <span class="picker-sub" id="pickerSub"></span>
        </div>
        <span class="picker-prog" id="pickerProg"></span>
        <span class="picker-chevron" id="pickerChevron">▼</span>
      </button>
      <button class="nav-arr" id="btnNext">›</button>
    </nav>

    <div class="selector" id="selector"></div>

    <main class="spread" id="spread"></main>

    <footer class="actions" id="actions"></footer>

  </div>
  <script src="script.js"></script>
</body>
</html>
