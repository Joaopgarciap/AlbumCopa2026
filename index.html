<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Álbum da Copa do Mundo 2026</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Álbum da Copa do Mundo 2026</h1>
        <p>
          Marque suas figurinhas, acompanhe o progresso e folheie o álbum página por
          página.
        </p>
      </header>

      <section class="progress-panel" aria-label="Progresso geral do álbum">
        <div class="progress-text">
          <strong id="globalProgressLabel">0 de 0 figurinhas</strong>
          <span id="globalProgressPercent">0%</span>
        </div>
        <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
          <div id="globalProgressFill" class="progress-fill"></div>
        </div>
      </section>

      <section class="album-controls" aria-label="Controles do álbum">
        <button id="previousPageButton" type="button">← Página anterior</button>

        <label for="pageSelect" class="select-label">Página:</label>
        <select id="pageSelect"></select>

        <button id="nextPageButton" type="button">Próxima página →</button>
      </section>

      <section id="albumPage" class="album-page" aria-live="polite">
        <div class="page-header">
          <p id="pageCounter" class="page-counter">Página 1 de 1</p>
          <h2 id="pageTitle">Carregando...</h2>
          <p id="pageDescription"></p>
        </div>

        <div class="page-progress">
          <span id="pageProgressLabel">0 de 0 nesta página</span>
        </div>

        <div id="stickersGrid" class="stickers-grid"></div>
      </section>

      <section class="footer-actions" aria-label="Ações extras">
        <button id="markAllPageButton" type="button">Marcar página inteira</button>
        <button id="unmarkAllPageButton" type="button">Desmarcar página inteira</button>
        <button id="resetAlbumButton" type="button" class="danger">
          Reiniciar álbum completo
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
